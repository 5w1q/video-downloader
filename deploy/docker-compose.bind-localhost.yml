# 与 docker-compose.yml 叠加：前端 Nginx 绑定本机 18080（避免与常见 8080 占用冲突）。
# 宿主机 Nginx 的 proxy_pass 须指向 http://127.0.0.1:18080（见 deploy/nginx-video.sayhi-ab.asia.conf）。
# docker compose -f docker-compose.yml -f deploy/docker-compose.bind-localhost.yml up -d --build
services:
  web:
    ports:
      - "127.0.0.1:18080:80"
