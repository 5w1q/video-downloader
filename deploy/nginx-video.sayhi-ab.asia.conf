# 新加坡：系统 Nginx → Docker 前端（127.0.0.1:18080，需配合 docker-compose.bind-localhost.yml）
# Certbot 执行后若出现 502，多半是 443 的 server 块缺少 proxy_pass，请用本文件整体替换
#   /etc/nginx/sites-available/video.sayhi-ab.asia
# 然后：sudo nginx -t && sudo systemctl reload nginx
#
# 若 /etc/letsencrypt/options-ssl-nginx.conf 不存在，可删掉对应 include 行，或运行：
#   sudo apt install -y python3-certbot-nginx  # 部分系统会带上该文件

# HTTP：跳转 HTTPS（证书续期需保留 /.well-known，Certbot 有时会写入此路径）
server {
    listen 80;
    listen [::]:80;
    server_name video.sayhi-ab.asia;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS：反代到本机 Docker 前端
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name video.sayhi-ab.asia;

    ssl_certificate     /etc/letsencrypt/live/video.sayhi-ab.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/video.sayhi-ab.asia/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 0;
        proxy_buffering off;
    }
}
