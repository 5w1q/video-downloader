# 新加坡服务器：系统 Nginx 反代 Docker 中的 video-downloader（docker-compose web 映射 127.0.0.1:8080）
# 用法（Debian/Ubuntu 示例）：
#   sudo cp deploy/nginx-video.sayhi-ab.asia.conf /etc/nginx/sites-available/video.sayhi-ab.asia
#   sudo ln -sf /etc/nginx/sites-available/video.sayhi-ab.asia /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# SSL：sudo certbot --nginx -d video.sayhi-ab.asia

server {
    listen 80;
    listen [::]:80;
    server_name video.sayhi-ab.asia;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 0;
        proxy_buffering off;
    }
}
