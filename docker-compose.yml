services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      PERSIST_DOWNLOADS: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
