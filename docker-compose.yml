services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      PERSIST_DOWNLOADS: "1"
      UVICORN_WORKERS: "2"
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8001 --workers ${UVICORN_WORKERS:-2}"
    ports:
      # 宿主机 8002 → 容器内 8001（避免与其它服务占用 8001；compose 内 web 仍访问 backend:8001）
      - "127.0.0.1:8002:8001"
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/data:/app/data
      # B 站 412：在 backend/.env 设置 YTDLP_COOKIEFILE=/app/secrets/bilibili_cookies.txt，并将 cookies 放入 ./backend/secrets/
      - ./backend/secrets:/app/secrets:ro
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
