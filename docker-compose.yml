services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      PERSIST_DOWNLOADS: "1"
      # 试用期：镜像内存在 /app/keys/trial_public.pem 时必填（由 scripts/issue_trial_license.py 签发）
      # TRIAL_LICENSE: "eyJ..."
    ports:
      - "8000:8000"
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
